name: Build & Release App

# 触发条件：手动触发或标签推送
on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build
    runs-on: windows-latest
    env:
      PYTHONHASHSEED: 0
      SOURCE_DATE_EPOCH: 315532800
      MARCH7TH_LOG_LEVEL: DEBUG
      MARCH7TH_BROWSER_DOWNLOAD_USE_MIRROR: false
      PYTHONIOENCODING: utf-8

    steps:
      # 签出代码
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: "false"

      # 设置 uv 和 Python 环境
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.7"
          python-version: "3.13.11"
          enable-cache: true

      # 安装依赖
      - name: Install dependencies
        run: |
          uv sync
          uv pip install pyinstaller==6.17.0
          uv run python build.py --task ocr

      # 并行生成程序
      - name: Generate program
        run: |
          $p1 = Start-Process -FilePath "uv" -ArgumentList 'run pyinstaller --distpath ".\dist" ".\March7th Assistant.spec" -y' -PassThru -NoNewWindow
          $p2 = Start-Process -FilePath "uv" -ArgumentList 'run pyinstaller --distpath ".\dist" ".\March7th Launcher.spec" -y' -PassThru -NoNewWindow
          $p3 = Start-Process -FilePath "uv" -ArgumentList 'run pyinstaller --distpath ".\dist\March7thAssistant" ".\March7th Updater.spec" -y' -PassThru -NoNewWindow
          $p1.WaitForExit(); $p2.WaitForExit(); $p3.WaitForExit()
          if ($p1.ExitCode -ne 0 -or $p2.ExitCode -ne 0 -or $p3.ExitCode -ne 0) {
            Write-Host "Exit codes: Assistant=$($p1.ExitCode) Launcher=$($p2.ExitCode) Updater=$($p3.ExitCode)"
            exit 1
          }

      # 移动资源到dist目录
      - name: Move assets to dist directory
        run: |
          Copy-Item -Path ".\dist\March7th Assistant\*" -Destination ".\dist\March7thAssistant\" -Recurse -Force
          Copy-Item -Path ".\dist\March7th Launcher\*" -Destination ".\dist\March7thAssistant\" -Recurse -Force
          Copy-Item -Path ".\assets\" -Destination ".\dist\March7thAssistant\assets\" -Recurse -Force
          Copy-Item -Path ".\README.md" -Destination ".\dist\March7thAssistant\" -Force

      # 创建更新压缩包
      - name: Create archive
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Compress-Archive -Path .\dist\March7thAssistant\ -DestinationPath .\dist\March7thAssistant.zip -Force
          Rename-Item -Path .\dist\March7thAssistant -NewName update
          .\assets\binary\7za.exe a -t7z -m0=lzma2 -ms=on -mx=9 -md=128m .\dist\update.7z .\dist\update\
          Rename-Item -Path .\dist\update -NewName March7thAssistant

      # 获取第三方库最新发布版本
      - name: Get 3rdparty release tags
        if: startsWith(github.ref, 'refs/tags/')
        id: deps-tags
        run: |
          $asu = (gh api repos/moesnow/Auto_Simulated_Universe/releases/latest --jq '.tag_name' 2>$null)
          $fhoe = (gh api repos/linruowuyin/Fhoe-Rail/releases/latest --jq '.tag_name' 2>$null)
          $fps = (gh api repos/winTEuser/Genshin_StarRail_fps_unlocker/releases/latest --jq '.tag_name' 2>$null)
          $buildHash = "${{ hashFiles('build.py', 'module/game/cloud.py') }}"
          $hash = "${asu}-${fhoe}-${fps}-${buildHash}"
          echo "hash=$hash" >> $env:GITHUB_OUTPUT
          Write-Host "3rdparty cache key: $hash"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 缓存第三方库
      - name: Restore 3rdparty cache
        if: startsWith(github.ref, 'refs/tags/')
        id: cache-3rdparty
        uses: actions/cache@v5
        with:
          path: 3rdparty
          key: 3rdparty-${{ steps.deps-tags.outputs.hash }}

      # 下载第三方库（缓存未命中时）
      - name: Download 3rdparty
        if: startsWith(github.ref, 'refs/tags/') && steps.cache-3rdparty.outputs.cache-hit != 'true'
        run: uv run python build.py --task all

      # 生成日志并移动第三方库到dist目录
      - name: Move 3rdparty to dist directory
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          uv run python build.py --task changelog -v "${{ github.ref_name }}" -o changelog_temp.md
          Copy-Item -Path .\3rdparty\ -Destination .\dist\March7thAssistant\3rdparty\ -Recurse -Force
          Rename-Item -Path .\dist\March7thAssistant -NewName March7thAssistant_full

      # 创建完整的压缩包
      - name: Create full zip archive
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Compress-Archive -Path .\dist\March7thAssistant_full\ -DestinationPath .\dist\March7thAssistant_full.zip -Force
          .\assets\binary\7za.exe a -tzip .\dist\March7thAssistant_full.zip .\dist\March7thAssistant_full\
          .\assets\binary\7za.exe a -t7z -m0=lzma2 -ms=on -mx=9 -md=128m .\dist\March7thAssistant_full.7z .\dist\March7thAssistant_full\

      # 创建GitHub发布
      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: March7thAssistant ${{ github.ref_name }}
          body_path: changelog_temp.md
          files: |
            ./dist/March7thAssistant_full.zip
            ./dist/March7thAssistant_full.7z
            ./dist/update.7z
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          make_latest: true

      # 强制触发 MirrorChyan 上传
      - name: Trigger MirrorChyanUploading
        shell: bash
        run: |
          gh workflow run --repo $GITHUB_REPOSITORY 'MirrorChyan Uploading'
          gh workflow run --repo $GITHUB_REPOSITORY 'MirrorChyan Release Note'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
